<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Platforma</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
        }

        body {
            background-color: #2d3436;
            background-image: url('background.png');
            background-size: cover;
            max-width: 1280px;
            max-height: 720px;
            aspect-ratio: 16/9;
        }

        #logo {
            position: absolute;
            max-width: 50px; 
            z-index: 999;
        }

        #logo.top-left {
            top: 10px;
            left: 10px;
        }

        #logo.top-right {
            top: 10px;
            right: 10px;
        }

        #logo.bottom-left {
            bottom: 10px;
            left: 10px;
        }

        #video1, #video2 {
            display: none;
            opacity: 1;
            border: 0;
            width: 100%;
            height: 100%;
        }

        #web {
            display: none;
            border: 0;
            width: 100%;
            height: 100%;
        }

        #image {
            display: none;
            border: 0;
            width: 100%;
            height: 100%;
        }

        #text {
            display: none;
            color: rgb(209, 209, 209);
            font-size: 35px;
            font-family: 'Verdana';
            position: absolute;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #videoTitle {
            display: none;
            color: rgb(255, 255, 255);
            font-size: 30px;
            font-family: 'Verdana';
            text-shadow: 2px 3px black;
            position: absolute;
            width: 80%;
            top: 5%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.8;
        }

        #version {
            color: rgb(209, 209, 209);
            font-size: 11px;
            font-family: 'Verdana';
            position: absolute;
            bottom: 10px;
            right: 10px;
        }

        @media (max-width: 512px)
        {
            body {
                max-width: 512px;
                max-height: 256px;
                aspect-ratio: 2/1;
            }
            #videoTitle {
                font-size: 15px;
            }

            #text {
                font-size: 15px;
            }
            
            #version {
                bottom: 5px;
                right: 5px;
                font-size: 6px;
            }

            #logo.top-left {
                width: 25px;
                top: 5px;
                left: 5px;
            }
        }
    </style>
</head>

<body>
    
    <img class="top-left" id="logo" src="https://lmg5.lt/logo.png"/>
    

    <iframe id="web" allow="autoplay"></iframe>
    <video id="video1" autoplay nocontrols></video>
    <video id="video2" autoplay nocontrols></video>
    <video id="videoPreload" style="display: none;"></video>
    <image id="image"></image>
    
    <div id="text">...</div>
    <div id="videoTitle"></div>

    <div id="version">PVersion: 0.0</div>
</body>
</html>
